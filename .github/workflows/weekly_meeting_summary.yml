name: Meeting Summary Bot

on:
  schedule:
    - cron: "0 12 * * 5"
    - cron: "0 12 28-31 * *"

  workflow_dispatch:
    inputs:
      period_type:
        description: "期間タイプ（weekly=今週自動 / monthly=今月自動 / custom=日付指定）"
        required: true
        default: "weekly"
        type: choice
        options:
          - weekly
          - monthly
          - custom
      start_date:
        description: "開始日 (YYYY-MM-DD)　例: 2026-03-23　※日付を入れると period_type に関わらず優先されます"
        required: false
        default: ""
      end_date:
        description: "終了日 (YYYY-MM-DD)　例: 2026-03-28　※翌日の日付を入れてください（例: 金曜まで → 3/28 ではなく 3/29）"
        required: false
        default: ""

jobs:
  post-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine period type (for scheduled runs)
        id: period
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            TOMORROW=$(date -d "+1 day" +%d)
            if [ "$TOMORROW" = "01" ]; then
              echo "type=monthly" >> $GITHUB_OUTPUT
            else
              echo "type=weekly" >> $GITHUB_OUTPUT
            fi
          else
            echo "type=${{ github.event.inputs.period_type }}" >> $GITHUB_OUTPUT
          fi

      - name: Run meeting summary
        env:
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_USER_ID: ${{ secrets.SLACK_USER_ID }}
          SLACK_MY_CHANNEL_ID: ${{ secrets.SLACK_MY_CHANNEL_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          CALENDAR_ID: ${{ secrets.CALENDAR_ID }}
          PERIOD_TYPE: ${{ steps.period.outputs.type }}
        run: |
          PERIOD="${{ steps.period.outputs.type }}"
          START="${{ github.event.inputs.start_date }}"
          END="${{ github.event.inputs.end_date }}"

          if [ -n "$START" ] && [ -n "$END" ]; then
            python meeting_summary.py "$PERIOD" "$START" "$END"
          else
            python meeting_summary.py "$PERIOD"
          fi
