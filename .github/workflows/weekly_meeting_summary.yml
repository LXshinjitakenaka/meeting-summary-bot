name: Meeting Summary Bot

on:
  schedule:
    # 毎週金曜 21:00 JST（= UTC 12:00）→ 週次レポート
    - cron: "0 12 * * 5"
    # 毎月最終日 21:00 JST（= UTC 12:00）→ 月次レポート
    # ※ GitHub Actions は "L" 非対応のため 28〜31日を全部指定してスクリプト側で判定
    - cron: "0 12 28-31 * *"

  workflow_dispatch:
    inputs:
      period_type:
        description: "期間タイプ"
        required: true
        default: "weekly"
        type: choice
        options:
          - weekly
          - monthly
          - custom
      custom_start:
        description: "【custom用】開始日 (YYYY-MM-DD)　例: 2026-03-01"
        required: false
        default: ""
      custom_end:
        description: "【custom用】終了日 (YYYY-MM-DD)　例: 2026-03-31"
        required: false
        default: ""

jobs:
  post-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine period type (for scheduled runs)
        id: period
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # 月末判定: 翌日が1日ならば月次、それ以外は週次
            TOMORROW=$(date -d "+1 day" +%d)
            if [ "$TOMORROW" = "01" ]; then
              echo "type=monthly" >> $GITHUB_OUTPUT
            else
              echo "type=weekly" >> $GITHUB_OUTPUT
            fi
          else
            echo "type=${{ github.event.inputs.period_type }}" >> $GITHUB_OUTPUT
          fi

      - name: Run meeting summary
        env:
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_USER_ID: ${{ secrets.SLACK_USER_ID }}
          SLACK_MY_CHANNEL_ID: ${{ secrets.SLACK_MY_CHANNEL_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          CALENDAR_ID: ${{ secrets.CALENDAR_ID }}
          PERIOD_TYPE: ${{ steps.period.outputs.type }}
        run: |
          PERIOD="${{ steps.period.outputs.type }}"
          START="${{ github.event.inputs.custom_start }}"
          END="${{ github.event.inputs.custom_end }}"

          if [ "$PERIOD" = "custom" ] && [ -n "$START" ] && [ -n "$END" ]; then
            python meeting_summary.py custom "$START" "$END"
          else
            python meeting_summary.py "$PERIOD"
          fi
